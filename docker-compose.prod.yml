services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetum_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-fleetum}
    volumes:
      - /opt/fleetum/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleetum} -d ${POSTGRES_DB:-fleetum}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fleetum_private

  backend:
    image: ${FLEETUM_BACKEND_IMAGE:-ghcr.io/silviomasuccio6/fleetum-backend:latest}
    container_name: fleetum_backend
    restart: unless-stopped
    env_file:
      - /opt/fleetum/env/backend.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /opt/fleetum/uploads:/app/uploads
      - /opt/fleetum/logs:/app/logs
    expose:
      - "4000"
      - "4100"
    networks:
      - fleetum_private

  frontend-assets:
    image: ${FLEETUM_FRONTEND_ASSETS_IMAGE:-ghcr.io/silviomasuccio6/fleetum-frontend-assets:latest}
    container_name: fleetum_frontend_assets
    restart: "no"
    command: ["sh", "-c", "rm -rf /dist/* && cp -a /srv/fleetum/. /dist/"]
    volumes:
      - fleetum_frontend_dist:/dist
    networks:
      - fleetum_private

  caddy:
    image: caddy:2-alpine
    container_name: fleetum_caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend-assets:
        condition: service_completed_successfully
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:?CADDY_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - fleetum_frontend_dist:/srv/fleetum:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - fleetum_private

networks:
  fleetum_private:
    driver: bridge

volumes:
  fleetum_frontend_dist:
  caddy_data:
  caddy_config:
