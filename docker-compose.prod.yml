services:
  backend:
    image: ${FLEETUM_BACKEND_IMAGE:?FLEETUM_BACKEND_IMAGE must be set to an immutable GHCR image tag}
    container_name: fleetum_backend
    restart: unless-stopped
    env_file:
      - /opt/fleetum/env/backend.env
    volumes:
      - /opt/fleetum/uploads:/app/uploads
      - /opt/fleetum/logs:/app/logs
    expose:
      - "4000"
      - "4100"
    networks:
      - fleetum_private

  caddy:
    image: ${FLEETUM_FRONTEND_IMAGE:?FLEETUM_FRONTEND_IMAGE must be set to an immutable GHCR image tag}
    container_name: fleetum_caddy
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:?CADDY_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - fleetum_private

networks:
  fleetum_private:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
