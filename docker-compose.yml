# Per sviluppo locale — copia .env.local.example in .env.local
services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetum_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetum_dev}
      POSTGRES_DB: ${POSTGRES_DB:-fleetum}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - fleetum_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-fleetum} -d $${POSTGRES_DB:-fleetum}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  fleetum_postgres_data:
