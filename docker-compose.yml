services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-fleetum_postgres_local}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetum_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-fleetum}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - fleetum_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fleetum_local

networks:
  fleetum_local:
    driver: bridge

volumes:
  fleetum_postgres_data:
