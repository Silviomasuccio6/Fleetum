version: "3.9"

# Per sviluppo locale - copia .env.local.example in .env.local
# e avvia con: docker compose --env-file .env.local up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetum_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleetum_dev}
      POSTGRES_DB: ${POSTGRES_DB:-fleetum}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
