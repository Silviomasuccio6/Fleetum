name: Seed Demo Tenant Data

on:
  workflow_dispatch:
    inputs:
      tenantAdminEmail:
        description: "Email admin del tenant target"
        required: true
        default: "admin@fleetum.it"
      tenantId:
        description: "Tenant ID opzionale se l'email admin non e univoca"
        required: false
        default: ""
      confirmText:
        description: "Scrivi SEED_DEMO_DATA per confermare"
        required: true

concurrency:
  group: fleetum-seed-demo-tenant
  cancel-in-progress: false

jobs:
  seed-demo-tenant:
    name: Seed demo tenant on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Validate confirmation
        env:
          CONFIRM_TEXT: ${{ github.event.inputs.confirmText }}
        run: |
          if [ "$CONFIRM_TEXT" != "SEED_DEMO_DATA" ]; then
            echo "Conferma non valida. Inserire esattamente SEED_DEMO_DATA." >&2
            exit 1
          fi

      - name: Configure SSH key
        env:
          FLEETUM_VPS_SSH_KEY: ${{ secrets.FLEETUM_VPS_SSH_KEY }}
          FLEETUM_VPS_HOST: ${{ vars.FLEETUM_VPS_HOST }}
        run: |
          test -n "$FLEETUM_VPS_SSH_KEY"
          test -n "$FLEETUM_VPS_HOST"
          mkdir -p ~/.ssh
          printf '%s\n' "$FLEETUM_VPS_SSH_KEY" > ~/.ssh/fleetum_vps
          chmod 600 ~/.ssh/fleetum_vps
          ssh-keyscan -H "$FLEETUM_VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run idempotent demo tenant seed
        env:
          FLEETUM_VPS_HOST: ${{ vars.FLEETUM_VPS_HOST }}
          FLEETUM_VPS_USER: ${{ vars.FLEETUM_VPS_USER }}
          FLEETUM_APP_DIR: ${{ vars.FLEETUM_APP_DIR }}
          FLEETUM_ENV_FILE: ${{ vars.FLEETUM_ENV_FILE }}
          DEMO_TENANT_ADMIN_EMAIL: ${{ github.event.inputs.tenantAdminEmail }}
          DEMO_TENANT_ID: ${{ github.event.inputs.tenantId }}
        run: |
          test -n "$FLEETUM_VPS_HOST"
          test -n "$FLEETUM_VPS_USER"
          test -n "$FLEETUM_APP_DIR"
          test -n "$FLEETUM_ENV_FILE"
          TENANT_ADMIN_EMAIL_B64="$(printf '%s' "$DEMO_TENANT_ADMIN_EMAIL" | base64 -w0)"
          TENANT_ID_B64="$(printf '%s' "$DEMO_TENANT_ID" | base64 -w0)"
          ssh -o IdentitiesOnly=yes -i ~/.ssh/fleetum_vps "$FLEETUM_VPS_USER@$FLEETUM_VPS_HOST" \
            "cd '$FLEETUM_APP_DIR' && DEMO_TENANT_ADMIN_EMAIL=\"\$(printf '%s' '$TENANT_ADMIN_EMAIL_B64' | base64 -d)\" DEMO_TENANT_ID=\"\$(printf '%s' '$TENANT_ID_B64' | base64 -d)\" docker compose --env-file '$FLEETUM_ENV_FILE' -f docker-compose.prod.yml run --rm -e NODE_ENV=production -e ALLOW_DEMO_SEED_PRODUCTION=true -e DEMO_TENANT_ADMIN_EMAIL -e DEMO_TENANT_ID backend npm run seed:demo-tenant"

      - name: Production API ready check
        run: curl -fsS --max-time 20 https://api.fleetum.it/api/ready
