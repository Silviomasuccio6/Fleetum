name: E2E Nightly

on:
  workflow_dispatch:
    inputs:
      baseUrl:
        description: "Fleetum frontend URL"
        required: false
        default: "https://fleetum.it"
      apiUrl:
        description: "Fleetum API URL including /api"
        required: false
        default: "https://api.fleetum.it/api"
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright critical flows
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      E2E_BASE_URL: ${{ github.event.inputs.baseUrl || vars.E2E_BASE_URL || 'https://fleetum.it' }}
      E2E_API_URL: ${{ github.event.inputs.apiUrl || vars.E2E_API_URL || 'https://api.fleetum.it/api' }}
      E2E_TENANT_EMAIL: ${{ secrets.E2E_TENANT_EMAIL }}
      E2E_TENANT_PASSWORD: ${{ secrets.E2E_TENANT_PASSWORD }}
      E2E_OTHER_TENANT_EMAIL: ${{ secrets.E2E_OTHER_TENANT_EMAIL }}
      E2E_OTHER_TENANT_PASSWORD: ${{ secrets.E2E_OTHER_TENANT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check E2E configuration
        run: |
          if [ -z "$E2E_TENANT_EMAIL" ] || [ -z "$E2E_TENANT_PASSWORD" ]; then
            echo "E2E tenant credentials not configured. Skipping critical-flow tests."
            exit 0
          fi
          echo "E2E configured for $E2E_BASE_URL"

      - name: Run Playwright critical flows
        if: env.E2E_TENANT_EMAIL != '' && env.E2E_TENANT_PASSWORD != ''
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces/videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/e2e/
          if-no-files-found: ignore
          retention-days: 14
