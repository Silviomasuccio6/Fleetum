name: Backup Restore Test

on:
  workflow_dispatch:
  schedule:
    - cron: "42 3 1 * *"

permissions:
  contents: read
  issues: write

jobs:
  restore-test:
    name: Monthly restore test on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      FLEETUM_APP_DIR: ${{ vars.FLEETUM_APP_DIR || vars.APP_DIR || '/opt/fleetum/app' }}
      FLEETUM_VPS_HOST: ${{ vars.FLEETUM_VPS_HOST || vars.VPS_HOST }}
      FLEETUM_VPS_USER: ${{ vars.FLEETUM_VPS_USER || vars.VPS_USER }}
      FLEETUM_VPS_SSH_KEY: ${{ secrets.FLEETUM_VPS_SSH_KEY || secrets.VPS_SSH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate VPS restore test configuration
        run: |
          set -euo pipefail

          require_value() {
            local value="$1"
            local name="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing $name. Configure the canonical FLEETUM_* value, or the legacy fallback."
              exit 1
            fi
          }

          require_value "$FLEETUM_VPS_HOST" "repository/environment variable FLEETUM_VPS_HOST (or legacy VPS_HOST)"
          require_value "$FLEETUM_VPS_USER" "repository/environment variable FLEETUM_VPS_USER (or legacy VPS_USER)"
          require_value "$FLEETUM_VPS_SSH_KEY" "repository/environment secret FLEETUM_VPS_SSH_KEY (or legacy VPS_SSH_KEY)"
          require_value "$FLEETUM_APP_DIR" "repository/environment variable FLEETUM_APP_DIR (or legacy APP_DIR)"

          FLEETUM_VPS_HOST="$(printf '%s' "$FLEETUM_VPS_HOST" | tr -d '\r\n[:space:]')"
          FLEETUM_VPS_HOST="${FLEETUM_VPS_HOST#ssh://}"
          FLEETUM_VPS_HOST="${FLEETUM_VPS_HOST#*@}"
          FLEETUM_VPS_HOST="${FLEETUM_VPS_HOST%%:*}"
          FLEETUM_VPS_USER="$(printf '%s' "$FLEETUM_VPS_USER" | tr -d '\r\n[:space:]')"
          FLEETUM_APP_DIR="$(printf '%s' "$FLEETUM_APP_DIR" | tr -d '\r\n')"

          if ! [[ "$FLEETUM_VPS_HOST" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$|^[A-Za-z0-9.-]+$ ]]; then
            echo "::error::FLEETUM_VPS_HOST must be only an IPv4 address or hostname, without protocol, user, port, spaces or quotes."
            exit 1
          fi

          if [[ "$FLEETUM_VPS_SSH_KEY" != *"BEGIN "*PRIVATE*" KEY"* ]]; then
            echo "::error::FLEETUM_VPS_SSH_KEY is not a valid private SSH key. Store the full private key, not the public key."
            exit 1
          fi

          {
            echo "FLEETUM_VPS_HOST=$FLEETUM_VPS_HOST"
            echo "FLEETUM_VPS_USER=$FLEETUM_VPS_USER"
            echo "FLEETUM_APP_DIR=$FLEETUM_APP_DIR"
          } >> "$GITHUB_ENV"

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [[ "$FLEETUM_VPS_SSH_KEY" == *\\n* ]]; then
            printf '%b' "$FLEETUM_VPS_SSH_KEY" > ~/.ssh/fleetum_vps
          else
            printf '%s\n' "$FLEETUM_VPS_SSH_KEY" > ~/.ssh/fleetum_vps
          fi
          chmod 600 ~/.ssh/fleetum_vps
          ssh-keyscan -T 10 -H "$FLEETUM_VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run non-destructive restore test on VPS
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 -o IdentitiesOnly=yes -i ~/.ssh/fleetum_vps "$FLEETUM_VPS_USER@$FLEETUM_VPS_HOST" \
            "FLEETUM_APP_DIR='$FLEETUM_APP_DIR' bash -se" <<'REMOTE_SCRIPT'
            set -euo pipefail
            cd "$FLEETUM_APP_DIR"
            chmod +x deploy/backup/*.sh

            # If production uploads are still empty, add a temporary non-PII sentinel
            # so the restore drill verifies a real file path without exposing customer files.
            UPLOADS_DIR="${UPLOADS_DIR:-/opt/fleetum/uploads}"
            RESTORE_SENTINEL_FILE=""
            cleanup_restore_sentinel() {
              if [ -n "$RESTORE_SENTINEL_FILE" ] && [ -f "$RESTORE_SENTINEL_FILE" ]; then
                rm -f "$RESTORE_SENTINEL_FILE"
              fi
            }
            trap cleanup_restore_sentinel EXIT

            mkdir -p "$UPLOADS_DIR"
            if ! find "$UPLOADS_DIR" -type f ! -name '.fleetum-restore-drill-sentinel.txt' -print -quit | grep -q .; then
              RESTORE_SENTINEL_FILE="$UPLOADS_DIR/.fleetum-restore-drill-sentinel.txt"
              {
                echo "Fleetum restore drill upload sentinel"
                echo "Purpose: non-sensitive monthly backup restore verification"
                echo "Created at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              } > "$RESTORE_SENTINEL_FILE"
              chmod 600 "$RESTORE_SENTINEL_FILE"
              echo "Created temporary non-PII uploads restore sentinel."
            fi

            ./deploy/backup/backup-postgres.sh
            ./deploy/backup/backup-uploads.sh
            RESTORE_DRILL_SOURCE=offsite ./deploy/backup/restore-postgres-test.sh
          REMOTE_SCRIPT

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Backup restore test failed: ${context.sha.slice(0, 7)}`;
            const body = [
              'Monthly Fleetum restore test failed.',
              '',
              `Workflow: ${context.workflow}`,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Immediate actions:',
              '- Check GitHub Actions variables FLEETUM_VPS_HOST, FLEETUM_VPS_USER and FLEETUM_APP_DIR.',
              '- Check GitHub Actions secret FLEETUM_VPS_SSH_KEY.',
              '- Check latest PostgreSQL backup integrity.',
              '- Check VPS Docker availability and disk space.',
              '- Check offsite backup configuration and credentials.',
              '- Do not run destructive migrations until restore is green.'
            ].join('\n');
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['sre', 'backup', 'incident']
              });
            } catch (error) {
              core.warning(`Could not create restore-test failure issue with labels: ${error.message}`);
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
