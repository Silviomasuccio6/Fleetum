name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag o SHA da deployare"
        required: false
        default: "main"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

concurrency:
  group: fleetum-production
  cancel-in-progress: false

jobs:
  build-images:
    name: Build and publish production images
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_assets_image: ${{ steps.images.outputs.frontend_assets_image }}

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve image names
        id: images
        run: |
          IMAGE_TAG="$(git rev-parse --short=12 HEAD)"
          BACKEND_IMAGE="ghcr.io/silviomasuccio6/fleetum-backend:${IMAGE_TAG}"
          FRONTEND_ASSETS_IMAGE="ghcr.io/silviomasuccio6/fleetum-frontend-assets:${IMAGE_TAG}"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "frontend_assets_image=${FRONTEND_ASSETS_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.images.outputs.backend_image }}
            ghcr.io/silviomasuccio6/fleetum-backend:latest

      - name: Build and push frontend assets image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.fleetum.it/api
            VITE_PLATFORM_API_BASE_URL=https://platform.fleetum.it/platform-api
            VITE_CLIENT_APP_URL=https://fleetum.it/dashboard
            VITE_GOOGLE_AUTH_URL=https://api.fleetum.it/api/auth/google
            VITE_APPLE_AUTH_URL=https://api.fleetum.it/api/auth/apple
          tags: |
            ${{ steps.images.outputs.frontend_assets_image }}
            ghcr.io/silviomasuccio6/fleetum-frontend-assets:latest

  deploy:
    name: Deploy Fleetum VPS
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-images
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema backend/prisma/schema.prisma

      - name: Verify build before deploy
        run: npm run build

      - name: Configure SSH key
        env:
          FLEETUM_VPS_SSH_KEY: ${{ secrets.FLEETUM_VPS_SSH_KEY }}
          FLEETUM_VPS_HOST: 57.131.47.124
        run: |
          test -n "$FLEETUM_VPS_SSH_KEY"
          test -n "$FLEETUM_VPS_HOST"
          mkdir -p ~/.ssh
          printf '%s\n' "$FLEETUM_VPS_SSH_KEY" > ~/.ssh/fleetum_vps
          chmod 600 ~/.ssh/fleetum_vps
          ssh-keyscan -H "$FLEETUM_VPS_HOST" >> ~/.ssh/known_hosts

      - name: Verify remote deploy target
        env:
          FLEETUM_VPS_HOST: 57.131.47.124
          FLEETUM_VPS_USER: fleetum
          FLEETUM_APP_DIR: /opt/fleetum/app
        run: |
          ssh -o IdentitiesOnly=yes -i ~/.ssh/fleetum_vps "$FLEETUM_VPS_USER@$FLEETUM_VPS_HOST" \
            "test \"\$(whoami)\" = '$FLEETUM_VPS_USER' && mkdir -p '$FLEETUM_APP_DIR' && test -w '$FLEETUM_APP_DIR'"

      - name: Upload deployment manifests
        env:
          FLEETUM_VPS_HOST: 57.131.47.124
          FLEETUM_VPS_USER: fleetum
          FLEETUM_APP_DIR: /opt/fleetum/app
        run: |
          rsync -az --delete \
            --include 'docker-compose.prod.yml' \
            --include 'deploy/' \
            --include 'deploy/caddy/' \
            --include 'deploy/caddy/Caddyfile' \
            --include 'deploy/backup/' \
            --include 'deploy/backup/*.sh' \
            --include 'deploy/backup/*.md' \
            --exclude '*' \
            -e "ssh -o IdentitiesOnly=yes -i ~/.ssh/fleetum_vps" \
            ./ "$FLEETUM_VPS_USER@$FLEETUM_VPS_HOST:$FLEETUM_APP_DIR/"

      - name: Pull images, migrate and restart production containers
        env:
          FLEETUM_VPS_HOST: 57.131.47.124
          FLEETUM_VPS_USER: fleetum
          FLEETUM_APP_DIR: /opt/fleetum/app
          FLEETUM_ENV_FILE: /opt/fleetum/env/compose.env
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          FLEETUM_BACKEND_IMAGE: ${{ needs.build-images.outputs.backend_image }}
          FLEETUM_FRONTEND_ASSETS_IMAGE: ${{ needs.build-images.outputs.frontend_assets_image }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -o IdentitiesOnly=yes -i ~/.ssh/fleetum_vps "$FLEETUM_VPS_USER@$FLEETUM_VPS_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

          ssh -o IdentitiesOnly=yes -i ~/.ssh/fleetum_vps "$FLEETUM_VPS_USER@$FLEETUM_VPS_HOST" \
            "cd '$FLEETUM_APP_DIR' && export FLEETUM_BACKEND_IMAGE='$FLEETUM_BACKEND_IMAGE' FLEETUM_FRONTEND_ASSETS_IMAGE='$FLEETUM_FRONTEND_ASSETS_IMAGE' && docker compose --env-file '$FLEETUM_ENV_FILE' -f docker-compose.prod.yml pull && docker compose --env-file '$FLEETUM_ENV_FILE' -f docker-compose.prod.yml run --rm backend npx prisma migrate deploy --schema prisma/schema.prisma && docker compose --env-file '$FLEETUM_ENV_FILE' -f docker-compose.prod.yml up -d"

      - name: Install managed backup cron
        env:
          FLEETUM_VPS_HOST: 57.131.47.124
          FLEETUM_VPS_USER: fleetum
          FLEETUM_APP_DIR: /opt/fleetum/app
        run: |
          ssh -o IdentitiesOnly=yes -i ~/.ssh/fleetum_vps "$FLEETUM_VPS_USER@$FLEETUM_VPS_HOST" \
            "APP_DIR='$FLEETUM_APP_DIR' '$FLEETUM_APP_DIR/deploy/backup/install-cron.sh'"

      - name: Production health checks
        run: |
          for i in {1..12}; do
            if curl -fsS --max-time 20 https://api.fleetum.it/api/health; then
              break
            fi
            if [ "$i" = "12" ]; then
              echo "Backend health check failed after retries" >&2
              exit 1
            fi
            sleep 5
          done

          for i in {1..12}; do
            if curl -fsS --max-time 20 https://fleetum.it/ | grep -q "Fleetum"; then
              break
            fi
            if [ "$i" = "12" ]; then
              echo "Frontend health check failed after retries" >&2
              exit 1
            fi
            sleep 5
          done

          curl -fsS --max-time 20 https://fleetum.it/robots.txt | grep -q "Sitemap"
          curl -fsS --max-time 20 https://fleetum.it/sitemap.xml | grep -q "fleetum.it/demo"
