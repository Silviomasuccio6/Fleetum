name: Secret History Scan

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or SHA to scan"
        required: false
        default: "main"
      fail_on_findings:
        description: "Fail the workflow when unbaselined findings are detected"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "27 3 * * 1"

permissions:
  contents: read

jobs:
  gitleaks-history:
    name: Gitleaks full history
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout full history (manual ref)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout full history (scheduled)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch all remote branches and tags
        run: |
          git fetch --force --prune origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*'

      - name: Run Gitleaks on full history
        id: gitleaks
        shell: bash
        run: |
          set +e

          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect \
              --source /repo \
              --redact \
              --log-opts="--all" \
              --report-format sarif \
              --report-path /repo/gitleaks-history.sarif

          status="$?"
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"

          if [ "$status" -eq 0 ]; then
            echo "### Secret history scan" >> "$GITHUB_STEP_SUMMARY"
            echo "No unbaselined findings detected in full git history." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Secret history scan" >> "$GITHUB_STEP_SUMMARY"
            echo "Gitleaks detected one or more unbaselined findings in git history." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The SARIF artifact is redacted. Do not paste raw findings or suspected secrets in issues, PRs or chat." >> "$GITHUB_STEP_SUMMARY"
            echo "Follow docs/security/secret-scanning-policy.md for triage and remediation." >> "$GITHUB_STEP_SUMMARY"
          fi

          # Keep scheduled/manual scans usable even while legacy findings are being triaged.
          # Manual runs can opt in to failing below with fail_on_findings=true.
          exit 0

      - name: Upload redacted Gitleaks SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-history-sarif
          path: gitleaks-history.sarif
          if-no-files-found: ignore
          retention-days: 14

      - name: Enforce manual failure on findings
        if: >
          github.event_name == 'workflow_dispatch' &&
          inputs.fail_on_findings == 'true' &&
          steps.gitleaks.outputs.exit_code != '0'
        run: |
          echo "Gitleaks found unbaselined history findings and fail_on_findings=true was selected."
          exit 1
