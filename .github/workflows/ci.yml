name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source /repo --no-git --redact --verbose

  sast:
    name: SAST (Semgrep, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan --config p/owasp-top-ten --metrics=off .

  verify:
    name: Lint, Build, Test, Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema backend/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Backend tests
        env:
          NODE_ENV: test
        run: npm run test -w backend

      - name: Frontend tests
        run: npx tsx --test frontend/tests/*.test.ts

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

      - name: Public SEO artifacts smoke
        run: |
          test -f frontend/public/robots.txt
          test -f frontend/public/sitemap.xml
          grep -q "fleetum.it/demo" frontend/public/sitemap.xml

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
