name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source /repo --no-git --redact --verbose

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e SEMGREP_APP_TOKEN \
            semgrep/semgrep:latest \
            semgrep scan \
              --config p/owasp-top-ten \
              --config p/nodejs \
              --metrics=off \
              --error \
              --severity ERROR \
              --sarif \
              --output semgrep.sarif \
              .

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  verify:
    name: Lint, Build, Test, Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema backend/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Backend tests
        env:
          NODE_ENV: test
        run: npm run test -w backend

      - name: Frontend tests
        run: npx tsx --test frontend/tests/*.test.ts

      - name: Public SEO artifacts smoke
        run: |
          test -f frontend/public/robots.txt
          test -f frontend/public/sitemap.xml
          test -f frontend/public/llms.txt
          test -f frontend/public/brand/fleetum-social-preview.png
          grep -q "fleetum.it/demo" frontend/public/sitemap.xml
          npm run verify:prerender -w frontend

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

  tenant-isolation:
    name: Tenant Isolation HTTP Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fleetum
          POSTGRES_PASSWORD: fleetum_dev
          POSTGRES_DB: fleetum_ci
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U fleetum -d fleetum_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://fleetum:fleetum_dev@localhost:5433/fleetum_ci?schema=public
      JWT_SECRET: test-jwt-secret-for-ci-only-0000000000000000
      PLATFORM_JWT_SECRET: test-platform-jwt-secret-for-ci-only-000000000000000000000000000000000000000000
      PLATFORM_ADMIN_PASSWORD_HASH: $2a$12$1kW0dHz8CuORBMdsqDk9Z.HEJFh/IofTBgmMuBA43F8VUoCgX0Bde
      PLATFORM_ADMIN_EMAIL: ci-admin@example.local
      EMAIL_PROVIDER: smtp
      SMTP_HOST: localhost
      SMTP_USER: ci@example.local
      SMTP_PASS: ci-smtp-pass-placeholder
      STORAGE_PROVIDER: local
      UPLOAD_DIR: uploads-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema backend/prisma/schema.prisma

      - name: Apply database migrations
        run: npx prisma migrate deploy --schema backend/prisma/schema.prisma

      - name: Run black-box tenant isolation tests
        run: npm run test:tenant-isolation -w backend

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -w frontend

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false
