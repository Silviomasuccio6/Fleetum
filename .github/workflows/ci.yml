name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source /repo --no-git --redact --verbose

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e SEMGREP_APP_TOKEN \
            semgrep/semgrep:latest \
            semgrep scan \
              --config p/owasp-top-ten \
              --config p/nodejs \
              --metrics=off \
              --error \
              --severity ERROR \
              --sarif \
              --output semgrep.sarif \
              .

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  verify:
    name: Lint, Build, Test, Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema backend/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Backend tests
        env:
          NODE_ENV: test
        run: npm run test -w backend

      - name: Frontend tests
        run: npx tsx --test frontend/tests/*.test.ts

      - name: Public SEO artifacts smoke
        run: |
          test -f frontend/public/robots.txt
          test -f frontend/public/sitemap.xml
          grep -q "fleetum.it/demo" frontend/public/sitemap.xml

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
