services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetum_staging_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleetum_staging}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-fleetum_staging}
    volumes:
      - /opt/fleetum-staging/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleetum_staging} -d ${POSTGRES_DB:-fleetum_staging}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fleetum_staging_private

  backend:
    image: ${FLEETUM_BACKEND_IMAGE:-ghcr.io/silviomasuccio6/fleetum-backend:staging-latest}
    container_name: fleetum_staging_backend
    restart: unless-stopped
    env_file:
      - /opt/fleetum-staging/env/backend.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /opt/fleetum-staging/uploads:/app/uploads
      - /opt/fleetum-staging/logs:/app/logs
    expose:
      - "4000"
      - "4100"
    networks:
      - fleetum_staging_private

  frontend-assets:
    image: ${FLEETUM_FRONTEND_ASSETS_IMAGE:-ghcr.io/silviomasuccio6/fleetum-frontend-assets:staging-latest}
    container_name: fleetum_staging_frontend_assets
    restart: "no"
    command: ["sh", "-c", "rm -rf /dist/* && cp -a /srv/fleetum/. /dist/"]
    volumes:
      - staging_frontend_dist:/dist
    networks:
      - fleetum_staging_private

  caddy:
    image: caddy:2-alpine
    container_name: fleetum_staging_caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend-assets:
        condition: service_completed_successfully
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:?CADDY_EMAIL is required}
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./deploy/caddy/Caddyfile.staging:/etc/caddy/Caddyfile:ro
      - staging_frontend_dist:/srv/fleetum:ro
      - staging_caddy_data:/data
      - staging_caddy_config:/config
    networks:
      - fleetum_staging_private

networks:
  fleetum_staging_private:
    driver: bridge

volumes:
  staging_frontend_dist:
  staging_caddy_data:
  staging_caddy_config:
